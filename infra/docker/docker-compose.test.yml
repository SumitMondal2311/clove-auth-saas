services:
    redis:
        image: redis:8.0-alpine
        command: ["redis-server", "--requirepass", "redis"]
        ports:
            - 6302:6379
        volumes:
            - test_redis_data:/data
    postgres:
        image: postgres:17.5-alpine
        restart: unless-stopped
        ports:
            - 5402:5432
        environment:
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: clove
        volumes:
            - test_pgdata:/var/lib/postgresql/data

volumes:
    test_redis_data:
    test_pgdata:
